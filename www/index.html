<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mahjong Dynasties</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#070510}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:#070510;overflow:hidden;-webkit-overflow-scrolling:touch}
#header{padding-top:calc(10px + env(safe-area-inset-top));padding-left:calc(14px + env(safe-area-inset-left));padding-right:calc(14px + env(safe-area-inset-right));padding-bottom:8px;background:#070510;flex-shrink:0;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid #3a2000}
#header-row1{display:flex;align-items:center;justify-content:space-between;gap:8px}
#header-row2{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto}
#stats{display:flex;gap:10px;align-items:center}
h1{color:#d4a030;font-size:16px;font-weight:700;white-space:nowrap}
#controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stat{color:#c8a060;font-size:12px}
.stat span{color:#ffd080;font-weight:700}
select{background:#3a2000;color:#ffd080;border:1px solid #8a5010;padding:4px 8px;border-radius:5px;font-size:12px;cursor:pointer}
.btn{background:#7a2800;color:#ffd080;border:1px solid #aa4010;padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap}
.btn:hover{background:#9a3810}
@media (min-width:768px){
  .btn{padding:9px 18px;font-size:17px;border-radius:8px}
  select{padding:8px 12px;font-size:16px;border-radius:8px}
  .stat{font-size:14px}
  h1{font-size:20px}
  #header-row2{gap:10px}
}
.btn.hint-btn{background:#1a4a00;border-color:#3a8010}
.btn.hint-btn:hover{background:#2a6010}
.btn:disabled{opacity:0.4;cursor:default}
#board-wrap{flex:1;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;padding-top:12px;padding-left:calc(12px + env(safe-area-inset-left));padding-right:calc(12px + env(safe-area-inset-right));padding-bottom:calc(12px + env(safe-area-inset-bottom));touch-action:none}
#board{position:relative;transform-origin:top left;will-change:transform;touch-action:none}
#board{position:relative;transform-origin:top left}
.tile{position:absolute;cursor:pointer;transition:filter 0.12s,transform 0.1s;user-select:none}
.tile img{width:100%;height:100%;display:block;border-radius:4px;pointer-events:none}
.tile.blocked{cursor:default;filter:brightness(0.55) saturate(0.5)}
.tile.layer1{box-shadow:2px 2px 0 #8a6020,3px 3px 4px rgba(0,0,0,0.4)}
.tile.layer2{box-shadow:3px 3px 0 #8a6020,4px 4px 5px rgba(0,0,0,0.45),0 0 0 1px #c8a060 inset}
.tile.layer3{box-shadow:4px 4px 0 #8a6020,5px 5px 6px rgba(0,0,0,0.5),0 0 0 2px #ffd080 inset}
.tile.layer4,.tile.layer5{box-shadow:5px 5px 0 #8a6020,6px 6px 7px rgba(0,0,0,0.55),0 0 0 2px #ff8040 inset}
.tile.selected{filter:brightness(1.35) drop-shadow(0 0 7px #ffd070) !important;transform:scale(1.06);z-index:9999 !important}
.tile.hint{filter:brightness(1.2) drop-shadow(0 0 6px #00ff88) !important;animation:pulse 0.7s infinite alternate}
.tile.removed{display:none}
@keyframes pulse{from{filter:brightness(1.1) drop-shadow(0 0 4px #00cc66)}to{filter:brightness(1.35) drop-shadow(0 0 10px #00ff88)}}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:10000}
#msg-box{background:#2a1500;border:2px solid #d4a030;border-radius:14px;padding:28px 40px;text-align:center;color:#ffd080;position:relative;z-index:10001}
#msg-box h2{font-size:26px;margin-bottom:8px}
#msg-box p{color:#c8a060;font-size:14px;margin-bottom:16px}
#timer{font-variant-numeric:tabular-nums}
.apps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px}
.apps-grid-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.apps-icon{width:56px;height:56px;border-radius:13px;background:#2a1500}
.apps-label{font-size:9px;color:#c8a060;text-align:center;line-height:1.2}
.cat-tab{background:#1a0a00;color:#c8a060;border:1px solid #3a2000;padding:5px 10px;border-radius:14px;font-size:11px;cursor:pointer;white-space:nowrap}
.cat-tab.active{background:#8a3010;color:#ffd080;border-color:#d4a030}
#win-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;pointer-events:none;display:none}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
<!-- capacitor backgroundColor: #070510 -->
</head>
<body>
<div id="app">
<div id="header">
  <div id="header-row1">
    <h1>🀄 Mahjong Dynasties</h1>
    <div id="stats">
      <div class="stat">⏱ <span id="timer">00:00</span></div>
      <div class="stat">Tuiles: <span id="count">144</span></div>
      <div class="stat">Paires: <span id="pairs">0</span></div>
      <div class="stat">Combos: <span id="combos" style="color:#00ff88">0</span></div>
    </div>
  </div>
  <div id="header-row2">
    <select id="theme-sel" onchange="changeTheme()">
      <option value="mahjong">🀄</option>
      <option value="apps">📱</option>
      <option value="animals">🐾</option>
    </select>
    <select id="layout-sel" onchange="changeLayout()">
      <option value="turtle">🐢</option>
      <option value="pyramid">🔺</option>
      <option value="tower">🗼</option>
      <option value="cross">✚</option>
    </select>
    <button class="btn hint-btn" id="btn-hint" onclick="showHint()" title="Hint">💡</button>
    <button class="btn" id="btn-undo" onclick="undoMove()" disabled title="Annuler">↩</button>
    <button class="btn" onclick="initGame()" title="Restart">↺</button>
    <button class="btn" onclick="zoomBoard(-0.15)" title="Zoom -">−</button>
    <button class="btn" onclick="zoomBoard(+0.15)" title="Zoom +">+</button>
    <button class="btn" id="btn-anim" onclick="toggleAnim()" title="Animation">🎡</button>
    <button class="btn" id="btn-sound" onclick="toggleSound()" title="Son">🔊</button>
    <button class="btn" onclick="openSettings()" title="Nos apps">📱</button>
  </div>
</div>
<div id="board-wrap"><div id="board"></div></div>
<canvas id="win-canvas"></canvas>

<div id="overlay">
  <div id="msg-box">
    <h2 id="msg-title"></h2>
    <p id="msg-sub"></p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      
      <button class="btn" onclick="stopWinAnim();closeMsg();initGame()">↺</button>
    </div>
  </div>
</div>

function playPairSound(){
  if(!soundEnabled) return;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime+0.08);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.15);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime+0.15);
  }catch(e){}
}

function initGame(){
  clearInterval(timerInt);
  timerSec=0; updateTimer();
  timerInt=setInterval(()=>{timerSec++;updateTimer();},1000);

  currentLayout = document.getElementById('layout-sel').value;
  currentTheme = document.getElementById('theme-sel').value;
  const positions = LAYOUTS[currentLayout] || LAYOUTS['turtle'];
  // Mélange par paires pour garantir que chaque tuile a son partenaire
  const canonTypes = [...new Set(TILE_TYPES.map(t=>canonicalType(t)))];
  // Créer 72 paires canoniques (chaque type canonique x2 paires)
  const pairs = [];
  TILE_TYPES.forEach(t=>{
    const ct = canonicalType(t);
    pairs.push([t, t]); // paire de copies identiques
  });
  // 36 types x 2 paires = 72 paires = 144 tuiles
  // Mais on veut 4 copies de chaque type -> 2 paires par type
  // Refaire: créer les paires directement depuis le deck
  // Mode apps: types = app_1 à app_36
  if(currentTheme === 'apps'){
    const appTypes = APP_TILES.map((_,i)=>'app_'+(i+1));
    const appDeck = [...appTypes,...appTypes,...appTypes,...appTypes];
    shuffle(appDeck);
    tiles = positions.map((p,i)=>({
      id:i, type:appDeck[i], col:p[0], row:p[1], layer:p[2], removed:false, free:false
    }));
    selected=null; pairsCount=0; history=[]; hintIds=[];
    loadAppIcons();
    updateFreeState();
    requestAnimationFrame(()=>{
      const board=document.getElementById('board');
      if(board) board.style.transform=`scale(${boardScale})`;
    });
    // Démarrer timer
    clearInterval(timerInt);
    timerSec=0; updateTimer();
    timerInt=setInterval(()=>{timerSec++;updateTimer();},1000);
    document.getElementById('pairs').textContent=0;
    document.getElementById('count').textContent=144;
    document.getElementById('btn-undo').disabled=true;
    closeMsg();
    render();
    return;
  }
  
  // Thème animaux: même structure que apps
  if(currentTheme === 'animals'){
    const animalTypes = ANIMAL_EMOJIS.map((_,i)=>'animal_'+(i+1));
    const animalDeck = [...animalTypes,...animalTypes,...animalTypes,...animalTypes];
    shuffle(animalDeck);
    tiles = positions.map((p,i)=>({
      id:i, type:animalDeck[i], col:p[0], row:p[1], layer:p[2], removed:false, free:false
    }));
    selected=null; pairsCount=0; history=[]; hintIds=[];
    updateFreeState();
    requestAnimationFrame(()=>{
      const board=document.getElementById('board');
      if(board) board.style.transform=`scale(${boardScale})`;
    });
    clearInterval(timerInt);
    timerSec=0; updateTimer();
    timerInt=setInterval(()=>{timerSec++;updateTimer();},1000);
    document.getElementById('pairs').textContent=0;
    document.getElementById('count').textContent=144;
    document.getElementById('btn-undo').disabled=true;
    closeMsg();
    render();
    return;
  }
  
  const BASE_TYPES = ['b1','b2','b3','b4','b5','b6','b7','b8','b9',
    'c1','c2','c3','c4','c5','c6','c7','c8','c9',
    'm1','m2','m3','m4','m5','m6','m7','m8','m9',
    'we','ws','ww','wn','dg','dr2','dr','dw'];
  const SEASON_TYPES = ['s1','s2','s3','s4'];
  const FLOWER_TYPES = ['f1','f2','f3','f4'];
  const rawBase=[...BASE_TYPES,...BASE_TYPES,...BASE_TYPES,...BASE_TYPES];
  shuffle(rawBase);
  const byType={};
  rawBase.forEach(t=>{
    const ct=canonicalType(t);
    if(!byType[ct]) byType[ct]=[];
    byType[ct].push(t);
  });
  const pairedDeck=[];
  Object.values(byType).forEach(group=>{
    for(let i=0;i<group.length;i+=2){
      if(i+1<group.length) pairedDeck.push([group[i],group[i+1]]);
    }
  });
  shuffle(pairedDeck);
  const specialPairs=[
    [FLOWER_TYPES[0],SEASON_TYPES[0]],  // f1 + s1
    [FLOWER_TYPES[1],SEASON_TYPES[1]],  // f2 + s2
    [FLOWER_TYPES[2],SEASON_TYPES[2]],  // f3 + s3
    [FLOWER_TYPES[3],SEASON_TYPES[3]],  // f4 + s4
  ];
  shuffle(specialPairs);
  const allPairs=[...pairedDeck,...specialPairs];
  shuffle(allPairs);
  const deck=allPairs.flat();

  tiles = positions.map((p,i)=>({
    id:i, type:deck[i], col:p[0], row:p[1], layer:p[2], removed:false, free:false
  }));
  selected=null; pairsCount=0; history=[]; hintIds=[];
  
  // Mode apps: charger les icônes iTunes
  if(currentTheme === 'apps') loadAppIcons();
  
  updateFreeState();
  requestAnimationFrame(()=>{
    const board=document.getElementById('board');
    if(board) board.style.transform=`scale(${boardScale})`;
  });
  document.getElementById('pairs').textContent=0;
  document.getElementById('count').textContent=144;
  document.getElementById('btn-undo').disabled=true;
  closeMsg();
  render();
}

// ── Mode Apps ──
window.APP_ICONS = {}; // cache: type -> url icône

async function loadAppIcons(){
  // Charger les icônes par groupes de 4 avec CapacitorHttp
  const { CapacitorHttp } = window.Capacitor ? window.Capacitor.Plugins : {};
  
  for(let i = 0; i < APP_TILES.length; i++){
    const app = APP_TILES[i];
    const type = 'app_' + (i+1);
    if(window.APP_ICONS[type]) continue;
    
    try {
      if(CapacitorHttp){
        // Dans Capacitor: utiliser CapacitorHttp
        const res = await CapacitorHttp.get({
          url: `https://itunes.apple.com/lookup?id=${app[1]}`
        });
        const d = typeof res.data === 'string' ? JSON.parse(res.data) : res.data;
        if(d.results && d.results[0]){
          window.APP_ICONS[type] = d.results[0].artworkUrl60;
          if(currentTheme === 'apps') render();
        }
      } else {
        // Dans Safari: JSONP fallback
        const cb = 'appcb_' + app[1];
        window[cb] = function(d){
          if(d.results&&d.results[0]){
            window.APP_ICONS[type] = d.results[0].artworkUrl60;
            if(currentTheme === 'apps') render();
          }
        };
        const s = document.createElement('script');
        s.src = `https://itunes.apple.com/lookup?id=${app[1]}&callback=${cb}`;
        document.body.appendChild(s);
      }
    } catch(e){}
    
    // Pause entre chaque requête pour éviter le rate limiting
    if(i % 5 === 4) await new Promise(r=>setTimeout(r,300));
  }
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function computeFree(t){
  if(t.removed) return false;
  // Recouverte: tuile exactement au-dessus (même col, même row, layer+1)
  const above=tiles.filter(o=>!o.removed&&o.layer===t.layer+1&&
    o.col===t.col&&o.row===t.row);
  if(above.length>0) return false;
  // Bloquée latéralement: voisin direct col-1 ET col+1, même row, même layer
  const left=tiles.filter(o=>!o.removed&&o.layer===t.layer&&
    o.col===t.col-1&&o.row===t.row);
  const right=tiles.filter(o=>!o.removed&&o.layer===t.layer&&
    o.col===t.col+1&&o.row===t.row);
  return !(left.length>0&&right.length>0);
}
function updateFreeState(){
  tiles.forEach(t=>{ t.free = computeFree(t); });
  updateCombos();
}
function updateCombos(){
  const free=tiles.filter(t=>!t.removed&&t.free);
  // Compter le nombre de TYPES distincts ayant au moins 2 tuiles libres
  const typeCounts={};
  free.forEach(t=>{
    const ct=canonicalType(t.type);
    typeCounts[ct]=(typeCounts[ct]||0)+1;
  });
  const count=Object.values(typeCounts).filter(n=>n>=2).length;
  const el=document.getElementById('combos');
  if(el){
    el.textContent=count;
    el.style.color=count===0?'#ff4040':count<=3?'#ffaa00':'#00ff88';
  }
}
function isFree(t){ return t.free===true; }

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const active=tiles.filter(t=>!t.removed);
  if(!active.length) return;
  const maxCol=Math.max(...active.map(t=>t.col))+2;
  const maxRow=Math.max(...active.map(t=>t.row))+2;

  const allCols=tiles.map(t=>t.col);
  const allRows=tiles.map(t=>t.row);
  const minCol=Math.min(...allCols);
  const minRow=Math.min(...allRows);
  const maxColAll=Math.max(...allCols);
  const maxRowAll=Math.max(...allRows);
  const offX=minCol<0?Math.abs(minCol)*UNITX+16:16;
  const offY=minRow<0?Math.abs(minRow)*UNITY+16:16;
  board.style.width=(maxColAll*UNITX+TW+offX+16)+'px';
  board.style.height=(maxRowAll*UNITY+TH+offY+16)+'px';

  const sorted=[...tiles].sort((a,b)=>a.layer-b.layer||a.row-b.row||a.col-b.col);
  sorted.forEach(t=>{
    if(t.removed) return;
    const el=document.createElement('div');
    const free=isFree(t);
    const isSelected=selected&&selected.id===t.id;
    const isHint=hintIds.includes(t.id);
    let cls='tile';
    if(!free) cls+=' blocked';
    if(isSelected) cls+=' selected';
    if(isHint&&!isSelected) cls+=' hint';
    if(t.layer>0) cls+=' layer'+t.layer;
    el.className=cls;
    // DEBUG overlay
    if(window.debugMode){
      const dbg=document.createElement('div');
      dbg.style.cssText='position:absolute;bottom:1px;left:1px;font-size:7px;color:'+(free?'lime':'red')+';background:rgba(0,0,0,0.7);padding:1px;z-index:2;line-height:1.2;pointer-events:none';
      dbg.textContent='c'+t.col+'r'+t.row+'l'+t.layer+' '+t.type+(free?'✓':'✗');
      el.appendChild(dbg);
    }
    const x=t.col*UNITX+t.layer*SH+offX;
    const y=t.row*UNITY-t.layer*SH+offY;
    const z=t.layer*1000+(t.row+10)*20+t.col;
    el.style.cssText=`left:${x}px;top:${y}px;width:${TW}px;height:${TH}px;z-index:${z}`;
    el.dataset.id=t.id;

      // Mode apps: fond blanc + icône centrée avec marge

      el.style.borderRadius = '8px';

  });
}

// Types visuellement similaires -> traités comme identiques
const TYPE_MAP = {"b5":"b4","b7":"b4","b6":"b8","b9":"b8","dr":"dr2","s1":"f1","s2":"f2","s3":"f3","s4":"f4"};
function canonicalType(t){ return TYPE_MAP[t]||t; }

function clickTile(id){
  hintIds=[];
  const t=tiles.find(x=>x.id===id);
  if(!t||!isFree(t)){
    // Tuile bloquée: reset selection + flash
    if(selected){selected=null;render();}
    const el=document.querySelector(`[data-id="${id}"]`);
    if(el){el.style.outline='3px solid #cc4400';setTimeout(()=>el.style.outline='',300);}
    return;
  }
  if(!selected){selected=t;render();return;}
  if(selected.id===t.id){selected=null;render();return;}
  if(canonicalType(selected.type)===canonicalType(t.type)){
    history.push([selected.id,t.id]);
    t.removed=true;
    tiles.find(x=>x.id===selected.id).removed=true;
    updateFreeState();
    playPairSound();
    pairsCount++;
    selected=null;
    document.getElementById('btn-undo').disabled=false;
    const rem=tiles.filter(x=>!x.removed).length;
    document.getElementById('pairs').textContent=pairsCount;
    document.getElementById('count').textContent=rem;
    render();
    if(rem===0){clearInterval(timerInt);launchWinAnimation();
    showMsg('🎉','');}
    else if(!hasMove()){reshuffleTiles();}
  } else {
    selected=t;render();
  }
}

function undoMove(){
  if(!history.length) return;
  const [id1,id2]=history.pop();
  tiles.find(t=>t.id===id1).removed=false;
  tiles.find(t=>t.id===id2).removed=false;
  updateFreeState();
  pairsCount--;
  selected=null; hintIds=[];
  const rem=tiles.filter(x=>!x.removed).length;
  document.getElementById('pairs').textContent=pairsCount;
  document.getElementById('count').textContent=rem;
  document.getElementById('btn-undo').disabled=history.length===0;
  render();
}

function showHint(){
  hintIds=[];
  const free=tiles.filter(t=>!t.removed&&isFree(t));
  for(let i=0;i<free.length;i++)
    for(let j=i+1;j<free.length;j++)
      if(canonicalType(free[i].type)===canonicalType(free[j].type)){
        hintIds=[free[i].id,free[j].id];
        render();
        setTimeout(()=>{hintIds=[];render();},2000);
        return;
      }
  showMsg('💡','');
}

function hasMove(){
  const free=tiles.filter(t=>!t.removed&&isFree(t));
  for(let i=0;i<free.length;i++)
    for(let j=i+1;j<free.length;j++)
      if(canonicalType(free[i].type)===canonicalType(free[j].type)) return true;
  return false;
}

function updateTimer(){
  document.getElementById('timer').textContent=formatTime(timerSec);
}
function formatTime(s){
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function showMsg(title,sub){
  document.getElementById('msg-title').textContent=title;
  document.getElementById('msg-sub').textContent=sub;
  document.getElementById('overlay').style.display='flex';
}
function reshuffleTiles(){
  const remaining = tiles.filter(t=>!t.removed);
  if(remaining.length === 0) return;
  
  const types = remaining.map(t=>t.type);
  
  // Mélange simple des types sur les positions existantes
  const shuffled = [...types];
  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }
  remaining.forEach((t,i)=>{ t.type=shuffled[i]; });
  updateFreeState();
  
  // Relancer le timer
  clearInterval(timerInt);
  timerInt = setInterval(()=>{timerSec++;updateTimer();},1000);
  
  closeMsg();
  render();
}
function closeMsg(){document.getElementById('overlay').style.display='none';}

function stopWinAnim(){
  const canvas = document.getElementById('win-canvas');
  if(canvas && canvas._stopAnim) canvas._stopAnim();
  const btn = document.getElementById('btn-anim');
  if(btn) btn.textContent = '🎡';
}
function toggleAnim(){
  const canvas = document.getElementById('win-canvas');
  const btn = document.getElementById('btn-anim');
  if(canvas.style.display === 'none' || canvas.style.display === ''){
    launchWinAnimation();
    if(btn) btn.textContent = '⏹';
  } else {
    stopWinAnim();
    if(btn) btn.textContent = '🎡';
    const sb = document.getElementById('anim-stop-btn');
    if(sb) sb.style.display = 'none';
  }
}
function launchWinAnimation(){
  const canvas = document.getElementById('win-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const CX = W/2, CY = H/2;

  // Charger les icônes apps via JSONP iTunes
  const appImgs = [];
  WIN_APPS.forEach((app, i) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const cb = 'winanim_cb_' + i;
    window[cb] = function(d){
      if(d.results&&d.results[0]) img.src = d.results[0].artworkUrl60;
    };
    const s = document.createElement('script');
    s.src = 'https://itunes.apple.com/lookup?id=' + app[1] + '&callback=' + cb;
    document.body.appendChild(s);
    appImgs.push(img);
  });

  // Orbites: plusieurs cercles concentriques avec icônes
  const N = WIN_APPS.length; // ~72 apps
  const orbits = [
    { r: Math.min(W,H)*0.18, count: 8,  speed: 0.0006,  size: 48, offset: 0 },
    { r: Math.min(W,H)*0.30, count: 14, speed: -0.0004, size: 44, offset: Math.PI/7 },
    { r: Math.min(W,H)*0.42, count: 20, speed: 0.0003,  size: 40, offset: 0 },
    { r: Math.min(W,H)*0.54, count: 26, speed: -0.0002, size: 36, offset: Math.PI/13 },
  ];

  // Assigner les apps aux orbites
  let appIdx = 0;
  orbits.forEach(orb => {
    orb.apps = [];
    for(let i=0; i<orb.count; i++){
      orb.apps.push(appImgs[appIdx % appImgs.length]);
      appIdx++;
    }
  });

  let angle = 0;
  let frame = 0;
  let animRunning = true;
  canvas._stopAnim = function(){ animRunning = false; canvas.style.display='none'; };

  function animate(){
    if(!animRunning) return;
    ctx.clearRect(0,0,W,H);

    // Fond sombre semi-transparent
    ctx.fillStyle = 'rgba(7,5,16,0.88)';
    ctx.fillRect(0,0,W,H);

    // Titre central
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const pulse = 1 + Math.sin(frame*0.05)*0.04;
    ctx.font = `bold ${Math.floor(36*pulse)}px sans-serif`;
    ctx.fillStyle = '#ffd080';
    ctx.shadowColor = '#d4a030';
    ctx.shadowBlur = 20;
    ctx.fillText('🎉 Bravo !', CX, CY);
    ctx.font = `${Math.floor(16*pulse)}px sans-serif`;
    ctx.fillStyle = '#c8a060';
    ctx.shadowBlur = 0;
    ctx.fillText('Mahjong Dynasties', CX, CY+40);
    ctx.restore();

    // Dessiner les orbites
    orbits.forEach((orb) => {
      const orb_angle = angle * orb.speed * 60 + orb.offset;
      orb.apps.forEach((img, i) => {
        const a = orb_angle + (i / orb.count) * Math.PI * 2;
        const x = CX + Math.cos(a) * orb.r;
        const y = CY + Math.sin(a) * orb.r;
        const s = orb.size;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(a + Math.PI/2);
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 8;
        if(img.complete && img.naturalWidth > 0){
          ctx.beginPath();
          ctx.roundRect(-s/2,-s/2,s,s, s*0.22);
          ctx.clip();
          ctx.drawImage(img,-s/2,-s/2,s,s);
        } else {
          ctx.fillStyle = '#2a1500';
          ctx.beginPath();
          ctx.roundRect(-s/2,-s/2,s,s, s*0.22);
          ctx.fill();
          ctx.fillStyle = '#d4a030';
          ctx.font = `${s*0.5}px sans-serif`;
          ctx.textAlign='center';
          ctx.textBaseline='middle';
          ctx.fillText('🀄', 0, 0);
        }
        ctx.restore();
      });
    });

    angle++;
    frame++;
    requestAnimationFrame(animate);
  }

  // Attendre que les icônes chargent avant de démarrer
  setTimeout(animate, 1500);
}

// ── Pinch-to-zoom + Pan tactile ──
(function(){
  const wrap = document.getElementById('board-wrap');
  let lastDist = 0, startX = 0, startY = 0;
  let panX = 0, panY = 0, startPanX = 0, startPanY = 0;
  let isPinching = false, isPanning = false;

  function getBoard(){ return document.getElementById('board'); }

  function applyTransform(){
    const b = getBoard();
    if(b) b.style.transform = `scale(${boardScale.toFixed(2)}) translate(${panX}px,${panY}px)`;
  }

  function dist(t){
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }

  wrap.addEventListener('touchstart', e=>{
    if(e.touches.length===2){
      isPinching = true; isPanning = false;
      lastDist = dist(e.touches);
      e.preventDefault();
    } else if(e.touches.length===1){
      isPanning = true; isPinching = false;
      startX = e.touches[0].clientX - panX * boardScale;
      startY = e.touches[0].clientY - panY * boardScale;
    }
  },{passive:false});

  wrap.addEventListener('touchmove', e=>{
    if(isPinching && e.touches.length===2){
      const d = dist(e.touches);
      const ratio = d / lastDist;
      boardScale = Math.min(2.5, Math.max(0.3, boardScale * ratio));
      lastDist = d;
      applyTransform();
      e.preventDefault();
    } else if(isPanning && e.touches.length===1 && !isPinching){
      panX = (e.touches[0].clientX - startX) / boardScale;
      panY = (e.touches[0].clientY - startY) / boardScale;
      applyTransform();
    }
  },{passive:false});

  wrap.addEventListener('touchend', e=>{
    if(e.touches.length < 2) isPinching = false;
    if(e.touches.length === 0) isPanning = false;
  });
})();

}
