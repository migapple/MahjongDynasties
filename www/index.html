<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mahjong Solitaire</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#12080000;font-family:sans-serif;height:100vh;display:flex;flex-direction:column;background:#1a0a00;overflow:hidden}
#header{background:#2a1500;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;flex-wrap:wrap}
h1{color:#d4a030;font-size:16px;font-weight:700;white-space:nowrap}
#controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stat{color:#c8a060;font-size:12px}
.stat span{color:#ffd080;font-weight:700}
select{background:#3a2000;color:#ffd080;border:1px solid #8a5010;padding:4px 8px;border-radius:5px;font-size:12px;cursor:pointer}
.btn{background:#7a2800;color:#ffd080;border:1px solid #aa4010;padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap}
.btn:hover{background:#9a3810}
.btn.hint-btn{background:#1a4a00;border-color:#3a8010}
.btn.hint-btn:hover{background:#2a6010}
.btn:disabled{opacity:0.4;cursor:default}
#board-wrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:12px}
#board{position:relative;transform-origin:top left}
.tile{position:absolute;cursor:pointer;transition:filter 0.12s,transform 0.1s;user-select:none}
.tile img{width:100%;height:100%;display:block;border-radius:4px;pointer-events:none}
.tile.blocked{cursor:default;filter:brightness(0.55) saturate(0.5)}
.tile.layer1{box-shadow:2px 2px 0 #8a6020,3px 3px 4px rgba(0,0,0,0.4)}
.tile.layer2{box-shadow:3px 3px 0 #8a6020,4px 4px 5px rgba(0,0,0,0.45),0 0 0 1px #c8a060 inset}
.tile.layer3{box-shadow:4px 4px 0 #8a6020,5px 5px 6px rgba(0,0,0,0.5),0 0 0 2px #ffd080 inset}
.tile.layer4,.tile.layer5{box-shadow:5px 5px 0 #8a6020,6px 6px 7px rgba(0,0,0,0.55),0 0 0 2px #ff8040 inset}
.tile.selected{filter:brightness(1.35) drop-shadow(0 0 7px #ffd070) !important;transform:scale(1.06);z-index:9999 !important}
.tile.hint{filter:brightness(1.2) drop-shadow(0 0 6px #00ff88) !important;animation:pulse 0.7s infinite alternate}
.tile.removed{display:none}
@keyframes pulse{from{filter:brightness(1.1) drop-shadow(0 0 4px #00cc66)}to{filter:brightness(1.35) drop-shadow(0 0 10px #00ff88)}}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:10000}
#msg-box{background:#2a1500;border:2px solid #d4a030;border-radius:14px;padding:28px 40px;text-align:center;color:#ffd080}
#msg-box h2{font-size:26px;margin-bottom:8px}
#msg-box p{color:#c8a060;font-size:14px;margin-bottom:16px}
#timer{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="header">
  <h1>🀄 Mahjong Solitaire</h1>
  <div id="controls">
    <div class="stat">⏱ <span id="timer">00:00</span></div>
    <div class="stat">Tuiles: <span id="count">144</span></div>
    <div class="stat">Paires: <span id="pairs">0</span></div>
    <select id="layout-sel" onchange="changeLayout()">
      <option value="turtle">🐢 Tortue</option>
      <option value="pyramid">🔺 Pyramide</option>
      <option value="tower">🗼 Tour</option>
      <option value="cross">✚ Croix</option>
    </select>
    <button class="btn hint-btn" id="btn-hint" onclick="showHint()">💡 Hint</button>
    <button class="btn" id="btn-undo" onclick="undoMove()" disabled>↩ Undo</button>
    <button class="btn" onclick="initGame()">↺ Restart</button>
    <button class="btn" onclick="window.debugMode=!window.debugMode;render()" style="background:#333">🔍 Debug</button>
  </div>
</div>
<div id="board-wrap"><div id="board"></div></div>
<div id="overlay">
  <div id="msg-box">
    <h2 id="msg-title"></h2>
    <p id="msg-sub"></p>
    <button class="btn" onclick="closeMsg();initGame()">↺ Nouvelle partie</button>
  </div>
</div>

const TILE_TYPES = ["b1", "b2", "b3", "b4", "b5", "b6", "b7", "b8", "b9", "c1", "c2", "c3", "c4", "c5", "c6", "c7", "c8", "c9", "m1", "m2", "m3", "m4", "m5", "m6", "m7", "m8", "m9", "we", "ws", "ww", "wn", "dr2", "dg", "dw", "flower", "b10"];

const TW=52, TH=64, UNIT=60, SH=0;
let tiles, selected, pairsCount, history, hintIds, timerSec, timerInt, currentLayout;

function initGame(){
  clearInterval(timerInt);
  timerSec=0; updateTimer();
  timerInt=setInterval(()=>{timerSec++;updateTimer();},1000);

  currentLayout = document.getElementById('layout-sel').value;
  const positions = LAYOUTS[currentLayout];
  const deck=[...TILE_TYPES,...TILE_TYPES,...TILE_TYPES,...TILE_TYPES];
  shuffle(deck);

  tiles = positions.map((p,i)=>({
    id:i, type:deck[i], col:p[0], row:p[1], layer:p[2], removed:false, free:false
  }));
  selected=null; pairsCount=0; history=[]; hintIds=[];
  updateFreeState();
  document.getElementById('pairs').textContent=0;
  document.getElementById('count').textContent=144;
  document.getElementById('btn-undo').disabled=true;
  closeMsg();
  render();
}

function changeLayout(){
  initGame();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function computeFree(t){
  if(t.removed) return false;
  // Recouverte: tuile exactement au-dessus (même col, même row, layer+1)
  const above=tiles.filter(o=>!o.removed&&o.layer===t.layer+1&&
    o.col===t.col&&o.row===t.row);
  if(above.length>0) return false;
  // Bloquée latéralement: voisin direct col-1 ET col+1, même row, même layer
  const left=tiles.filter(o=>!o.removed&&o.layer===t.layer&&
    o.col===t.col-1&&o.row===t.row);
  const right=tiles.filter(o=>!o.removed&&o.layer===t.layer&&
    o.col===t.col+1&&o.row===t.row);
  return !(left.length>0&&right.length>0);
}
function updateFreeState(){
  tiles.forEach(t=>{ t.free = computeFree(t); });
}
function isFree(t){ return t.free===true; }

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const active=tiles.filter(t=>!t.removed);
  if(!active.length) return;
  const maxCol=Math.max(...active.map(t=>t.col))+2;
  const maxRow=Math.max(...active.map(t=>t.row))+2;
  const maxLayer=Math.max(...active.map(t=>t.layer));
  const allCols=tiles.map(t=>t.col);
  const allRows=tiles.map(t=>t.row);
  const minCol=Math.min(...allCols);
  const minRow=Math.min(...allRows);
  const maxColAll=Math.max(...allCols);
  const maxRowAll=Math.max(...allRows);
  const offX=minCol<0?Math.abs(minCol)*UNIT+16:16;
  const offY=minRow<0?Math.abs(minRow)*UNIT+16:16;
  board.style.width=(maxColAll*UNIT+TW+offX+16)+'px';
  board.style.height=(maxRowAll*UNIT+TH+offY+16)+'px';

  const sorted=[...tiles].sort((a,b)=>a.layer-b.layer||a.row-b.row||a.col-b.col);
  sorted.forEach(t=>{
    if(t.removed) return;
    const el=document.createElement('div');
    const free=isFree(t);
    const isSelected=selected&&selected.id===t.id;
    const isHint=hintIds.includes(t.id);
    let cls='tile';
    if(!free) cls+=' blocked';
    if(isSelected) cls+=' selected';
    if(isHint&&!isSelected) cls+=' hint';
    if(t.layer>0) cls+=' layer'+t.layer;
    el.className=cls;
    // DEBUG overlay
    if(window.debugMode){
      const dbg=document.createElement('div');
      dbg.style.cssText='position:absolute;bottom:1px;left:1px;font-size:7px;color:'+(free?'lime':'red')+';background:rgba(0,0,0,0.7);padding:1px;z-index:2;line-height:1.2;pointer-events:none';
      dbg.textContent='c'+t.col+'r'+t.row+'l'+t.layer+' '+t.type+(free?'✓':'✗');
      el.appendChild(dbg);
    }
    const x=t.col*UNIT+t.layer*SH+offX;
    const y=t.row*UNIT-t.layer*SH+offY;
    const z=t.layer*1000+(t.row+10)*20+t.col;
    el.style.cssText=`left:${x}px;top:${y}px;width:${TW}px;height:${TH}px;z-index:${z}`;
    el.dataset.id=t.id;
    const img=document.createElement('img');
    img.src=IMGS[t.type];
    el.appendChild(img);
    if(free) el.onclick=()=>clickTile(t.id);
    board.appendChild(el);
  });
}

function clickTile(id){
  hintIds=[];
  const t=tiles.find(x=>x.id===id);
  if(!t||!isFree(t)){
    // Flash rouge: tuile bloquée cliquée
    const el=document.querySelector(`[data-id="${id}"]`);
    if(el){el.style.outline='3px solid red';setTimeout(()=>el.style.outline='',400);}
    return;
  }
  if(!selected){selected=t;render();return;}
  if(selected.id===t.id){selected=null;render();return;}
  console.log('Comparaison:',selected.type,'===',t.type,'->',selected.type===t.type);
  if(selected.type===t.type){
    history.push([selected.id,t.id]);
    t.removed=true;
    tiles.find(x=>x.id===selected.id).removed=true;
    updateFreeState();
    pairsCount++;
    selected=null;
    document.getElementById('btn-undo').disabled=false;
    const rem=tiles.filter(x=>!x.removed).length;
    document.getElementById('pairs').textContent=pairsCount;
    document.getElementById('count').textContent=rem;
    render();
    if(rem===0){clearInterval(timerInt);showMsg('🎉 Bravo !',`Terminé en ${formatTime(timerSec)} — ${pairsCount} paires`);}
    else if(!hasMove()){clearInterval(timerInt);showMsg('😔 Bloqué !','Aucune paire disponible');}
  } else {
    selected=t;render();
  }
}

function undoMove(){
  if(!history.length) return;
  const [id1,id2]=history.pop();
  tiles.find(t=>t.id===id1).removed=false;
  tiles.find(t=>t.id===id2).removed=false;
  updateFreeState();
  pairsCount--;
  selected=null; hintIds=[];
  const rem=tiles.filter(x=>!x.removed).length;
  document.getElementById('pairs').textContent=pairsCount;
  document.getElementById('count').textContent=rem;
  document.getElementById('btn-undo').disabled=history.length===0;
  render();
}

function showHint(){
  hintIds=[];
  const free=tiles.filter(t=>!t.removed&&isFree(t));
  for(let i=0;i<free.length;i++)
    for(let j=i+1;j<free.length;j++)
      if(free[i].type===free[j].type){
        hintIds=[free[i].id,free[j].id];
        render();
        setTimeout(()=>{hintIds=[];render();},2000);
        return;
      }
  showMsg('💡 Aucun hint','Aucune paire libre disponible');
}

function hasMove(){
  const free=tiles.filter(t=>!t.removed&&isFree(t));
  for(let i=0;i<free.length;i++)
    for(let j=i+1;j<free.length;j++)
      if(free[i].type===free[j].type) return true;
  return false;
}

function updateTimer(){
  document.getElementById('timer').textContent=formatTime(timerSec);
}
function formatTime(s){
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function showMsg(title,sub){
  document.getElementById('msg-title').textContent=title;
  document.getElementById('msg-sub').textContent=sub;
  document.getElementById('overlay').style.display='flex';
}
function closeMsg(){document.getElementById('overlay').style.display='none';}

initGame();
</script>
